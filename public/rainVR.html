<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make It Rain VR</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="A WebXR VR money gun experience. Hold the trigger and make it rain dollar bills in immersive virtual reality.">
    <meta name="keywords" content="Make It Rain, Money Gun, WebVR, WebXR game, VR browser game, Three.js VR, free VR game">
    <meta name="author" content="Willyci">
    <meta name="robots" content="index, follow">

    <!-- Open Graph for Social Sharing -->
    <meta property="og:title" content="Make It Rain VR - A WebXR Money Gun Experience">
    <meta property="og:description" content="Grab your VR controllers and spray cash everywhere with a money gun in this browser-based VR experience.">
    <meta property="og:type" content="website">

    <!-- Twitter Card Data -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Make It Rain VR">
    <meta name="twitter:description" content="Shoot money bills in VR with a money gun. Make it rain!">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; pointer-events: none;
            background: rgba(0,0,0,0.85); z-index: 10;
        }
        h1 { font-size: 5rem; margin: 0; background: linear-gradient(135deg, #00c853, #ffd600); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        h2 { font-size: 1.5rem; margin-top: 10px; color: #aaa; font-weight: 300; }
        p { font-size: 1.2rem; margin-top: 40px; color: #777; max-width: 600px; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>MAKE IT RAIN</h1>
        <h2>A WebXR Money Gun Experience</h2>
        <p>Hold the TRIGGER on either controller to fire money. Squeeze and spray cash everywhere!</p>
        <p style="color: white; margin-top: 50px;">Click "ENTER VR" below to start.</p>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.170.0/build/three.module.js';
        import { VRButton } from 'https://unpkg.com/three@0.170.0/examples/jsm/webxr/VRButton.js';

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x0a0a1a, 5, 50);
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const spotLight = new THREE.SpotLight(0xffd700, 3, 30, Math.PI / 4);
        spotLight.position.set(0, 10, 0);
        scene.add(spotLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 8, 3);
        scene.add(dirLight);

        // Gold & marble floor
        const floorGeo = new THREE.PlaneGeometry(40, 40);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.3, metalness: 0.5 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0;
        scene.add(floor);

        const grid = new THREE.GridHelper(40, 40, 0x2a2a4a, 0x111133);
        scene.add(grid);

        // Money bill texture (procedural)
        function createBillTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            // Bill background
            ctx.fillStyle = '#2d6a2d';
            ctx.fillRect(0, 0, 256, 128);

            // Border
            ctx.strokeStyle = '#4a9e4a';
            ctx.lineWidth = 6;
            ctx.strokeRect(8, 8, 240, 112);

            // Inner border
            ctx.strokeStyle = '#1a4a1a';
            ctx.lineWidth = 2;
            ctx.strokeRect(16, 16, 224, 96);

            // Dollar sign
            ctx.fillStyle = '#4a9e4a';
            ctx.font = 'bold 64px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', 128, 60);

            // Corner denominations
            ctx.font = 'bold 18px serif';
            ctx.fillText('100', 40, 30);
            ctx.fillText('100', 216, 30);
            ctx.fillText('100', 40, 100);
            ctx.fillText('100', 216, 100);

            // Fine pattern overlay
            ctx.strokeStyle = 'rgba(74, 158, 74, 0.3)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < 256; i += 8) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 128); ctx.stroke();
            }

            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.LinearFilter;
            return tex;
        }

        // Different bill colors for variety
        function createBillTextures() {
            const textures = [];
            const colors = [
                { bg: '#2d6a2d', border: '#4a9e4a', dark: '#1a4a1a', amount: '100' },
                { bg: '#1a5a5a', border: '#3a9a9a', dark: '#0a3a3a', amount: '50' },
                { bg: '#5a3a1a', border: '#9a7a4a', dark: '#3a2a0a', amount: '20' },
                { bg: '#4a2a5a', border: '#8a5a9a', dark: '#2a1a3a', amount: '500' },
            ];

            for (const c of colors) {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 128;
                const ctx = canvas.getContext('2d');

                ctx.fillStyle = c.bg;
                ctx.fillRect(0, 0, 256, 128);
                ctx.strokeStyle = c.border; ctx.lineWidth = 6;
                ctx.strokeRect(8, 8, 240, 112);
                ctx.strokeStyle = c.dark; ctx.lineWidth = 2;
                ctx.strokeRect(16, 16, 224, 96);
                ctx.fillStyle = c.border;
                ctx.font = 'bold 64px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('$', 128, 60);
                ctx.font = 'bold 18px serif';
                ctx.fillText(c.amount, 40, 30); ctx.fillText(c.amount, 216, 30);
                ctx.fillText(c.amount, 40, 100); ctx.fillText(c.amount, 216, 100);
                ctx.strokeStyle = `rgba(100,200,100,0.2)`; ctx.lineWidth = 0.5;
                for (let i = 0; i < 256; i += 8) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 128); ctx.stroke();
                }
                const tex = new THREE.CanvasTexture(canvas);
                tex.magFilter = THREE.LinearFilter;
                textures.push(tex);
            }
            return textures;
        }

        const billTextures = createBillTextures();
        const billGeo = new THREE.PlaneGeometry(0.16, 0.07);

        function createBillMaterial() {
            const tex = billTextures[Math.floor(Math.random() * billTextures.length)];
            return new THREE.MeshStandardMaterial({
                map: tex, side: THREE.DoubleSide,
                roughness: 0.6, metalness: 0.1
            });
        }

        // Money gun model (attached to controller)
        function createGunModel() {
            const group = new THREE.Group();

            // Main body
            const bodyGeo = new THREE.BoxGeometry(0.05, 0.08, 0.22);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.2, metalness: 0.8 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.set(0, 0, -0.11);
            group.add(body);

            // Barrel
            const barrelGeo = new THREE.CylinderGeometry(0.015, 0.02, 0.12, 8);
            barrelGeo.rotateX(Math.PI / 2);
            const barrelMat = new THREE.MeshStandardMaterial({ color: 0xccaa00, roughness: 0.1, metalness: 0.9 });
            const barrel = new THREE.Mesh(barrelGeo, barrelMat);
            barrel.position.set(0, 0.02, -0.25);
            group.add(barrel);

            // Slot (where bills come out)
            const slotGeo = new THREE.BoxGeometry(0.06, 0.005, 0.08);
            const slotMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
            const slot = new THREE.Mesh(slotGeo, slotMat);
            slot.position.set(0, 0.045, -0.18);
            group.add(slot);

            // Handle grip
            const gripGeo = new THREE.BoxGeometry(0.04, 0.1, 0.05);
            const gripMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
            const grip = new THREE.Mesh(gripGeo, gripMat);
            grip.position.set(0, -0.06, -0.04);
            grip.rotation.x = 0.2;
            group.add(grip);

            // Glow
            const glow = new THREE.PointLight(0xffd700, 0.5, 1);
            glow.position.set(0, 0, -0.2);
            group.add(glow);

            return group;
        }

        // Controllers
        const controller0 = renderer.xr.getController(0);
        const controller1 = renderer.xr.getController(1);
        scene.add(controller0);
        scene.add(controller1);

        const gun0 = createGunModel();
        const gun1 = createGunModel();
        controller0.add(gun0);
        controller1.add(gun1);

        // Track squeeze/trigger state
        const controllerStates = { 0: { squeezing: false, source: null }, 1: { squeezing: false, source: null } };

        controller0.addEventListener('connected', (e) => { controllerStates[0].source = e.data; });
        controller1.addEventListener('connected', (e) => { controllerStates[1].source = e.data; });

        controller0.addEventListener('selectstart', () => { controllerStates[0].squeezing = true; });
        controller0.addEventListener('selectend', () => { controllerStates[0].squeezing = false; });
        controller1.addEventListener('selectstart', () => { controllerStates[1].squeezing = true; });
        controller1.addEventListener('selectend', () => { controllerStates[1].squeezing = false; });

        // Also listen for squeeze (grip)
        controller0.addEventListener('squeezestart', () => { controllerStates[0].squeezing = true; });
        controller0.addEventListener('squeezeend', () => { controllerStates[0].squeezing = false; });
        controller1.addEventListener('squeezestart', () => { controllerStates[1].squeezing = true; });
        controller1.addEventListener('squeezeend', () => { controllerStates[1].squeezing = false; });

        let playing = false;
        renderer.xr.addEventListener('sessionstart', () => {
            playing = true;
            document.getElementById('overlay').style.display = 'none';
        });
        renderer.xr.addEventListener('sessionend', () => {
            playing = false;
            document.getElementById('overlay').style.display = 'flex';
        });

        // Bills system
        const bills = [];
        const MAX_BILLS = 2000; // keep floor covered but avoid perf issues
        let totalFired = 0;

        // Score UI
        const uiCanvas = document.createElement('canvas');
        uiCanvas.width = 512; uiCanvas.height = 256;
        const uiCtx = uiCanvas.getContext('2d');
        const uiTex = new THREE.CanvasTexture(uiCanvas);
        const uiMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(3, 1.5),
            new THREE.MeshBasicMaterial({ map: uiTex, transparent: true })
        );
        uiMesh.position.set(0, 3.5, -5);
        scene.add(uiMesh);

        function updateUI() {
            uiCtx.clearRect(0, 0, 512, 256);
            uiCtx.fillStyle = '#ffd700';
            uiCtx.font = 'bold 50px sans-serif';
            uiCtx.textAlign = 'center';
            uiCtx.fillText('MAKE IT RAIN', 256, 60);

            uiCtx.fillStyle = '#00ff88';
            uiCtx.font = 'bold 40px sans-serif';
            uiCtx.fillText('$' + (totalFired * 100).toLocaleString(), 256, 130);

            uiCtx.fillStyle = '#aaa';
            uiCtx.font = '28px sans-serif';
            uiCtx.fillText('Bills: ' + totalFired, 256, 190);

            uiTex.needsUpdate = true;
        }
        updateUI();

        // Fire rate control
        const fireInterval = 40; // ms between bills per controller
        const lastFire = { 0: 0, 1: 0 };

        const shootDir = new THREE.Vector3();
        const shootPos = new THREE.Vector3();

        function fireBill(controller, index, time) {
            if (time - lastFire[index] < fireInterval) return;
            lastFire[index] = time;

            const bill = new THREE.Mesh(billGeo, createBillMaterial());

            // Get world position and direction from the gun barrel
            controller.getWorldPosition(shootPos);
            controller.getWorldDirection(shootDir);
            shootDir.negate(); // controller faces -Z

            // Offset to barrel tip
            bill.position.copy(shootPos).addScaledVector(shootDir, 0.28);

            // Random spread
            const spread = 0.15;
            const velocity = new THREE.Vector3(
                shootDir.x * 6 + (Math.random() - 0.5) * spread * 6,
                shootDir.y * 6 + Math.random() * 2 + 1,
                shootDir.z * 6 + (Math.random() - 0.5) * spread * 6
            );

            // Random bill rotation
            bill.rotation.set(
                Math.random() * Math.PI,
                Math.random() * Math.PI,
                Math.random() * Math.PI
            );

            bill.userData = {
                velocity: velocity,
                spin: new THREE.Vector3(
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 10
                ),
                grounded: false
            };

            scene.add(bill);
            bills.push(bill);
            totalFired++;
            updateUI();

            // Remove oldest bills if over limit
            if (bills.length > MAX_BILLS) {
                const old = bills.shift();
                scene.remove(old);
            }
        }

        let lastTime = performance.now();

        renderer.setAnimationLoop((time) => {
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            if (playing) {
                // Fire bills from controllers that are squeezing
                if (controllerStates[0].squeezing) fireBill(controller0, 0, time);
                if (controllerStates[1].squeezing) fireBill(controller1, 1, time);

                // Update bills physics
                for (let i = bills.length - 1; i >= 0; i--) {
                    const b = bills[i];
                    if (b.userData.grounded) continue;

                    // Gravity
                    b.userData.velocity.y -= 5 * dt;

                    // Air resistance (bills flutter)
                    b.userData.velocity.x *= (1 - 0.5 * dt);
                    b.userData.velocity.z *= (1 - 0.5 * dt);

                    // Move
                    b.position.addScaledVector(b.userData.velocity, dt);

                    // Spin (slows down over time)
                    b.rotation.x += b.userData.spin.x * dt;
                    b.rotation.y += b.userData.spin.y * dt;
                    b.rotation.z += b.userData.spin.z * dt;
                    b.userData.spin.multiplyScalar(1 - 1.5 * dt);

                    // Hit the floor — stay there
                    if (b.position.y <= 0.01) {
                        b.position.y = 0.005 + Math.random() * 0.01;
                        b.rotation.x = -Math.PI / 2 + (Math.random() - 0.5) * 0.3;
                        b.rotation.z = Math.random() * Math.PI * 2;
                        b.userData.grounded = true;
                    }
                }
            }

            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
