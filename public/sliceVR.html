<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Slice VR</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="A high-octane WebXR VR rhythm slasher built entirely in the browser. Slice blocks with dual glowing lightsabers in immersive virtual reality.">
    <meta name="keywords" content="Slice VR, Beat Saber Clone, WebVR, WebXR game, VR browser game, Three.js VR, Lightsaber game, free VR game">
    <meta name="author" content="Willyci">
    <meta name="robots" content="index, follow">

    <!-- Open Graph for Social Sharing -->
    <meta property="og:title" content="Slice VR - A WebXR Rhythm Slasher">
    <meta property="og:description" content="Grab your VR controllers and slice incoming geometric blocks with brilliant neon sabers in this high-speed browser-based VR experience.">
    <meta property="og:type" content="website">

    <!-- Twitter Card Data -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Slice VR">
    <meta name="twitter:description" content="Play an intense WebXR lightsaber slicing game directly inside your VR browser. Test your reflexes!">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; pointer-events: none;
            background: rgba(0,0,0,0.85); z-index: 10;
        }
        h1 { font-size: 5rem; margin: 0; background: linear-gradient(135deg, #ff0044, #0044ff); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        h2 { font-size: 1.5rem; margin-top: 10px; color: #aaa; font-weight: 300; }
        p { font-size: 1.2rem; margin-top: 40px; color: #777; max-width: 600px; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>SLICE VR</h1>
        <h2>A WebXR Rhythm Slasher</h2>
        <p>Grab your VR controllers. Slicing RED blocks requires your left saber. Slicing BLUE blocks requires your right saber. GRAY blocks are wild.</p>
        <p style="color: white; margin-top: 50px;">Click "ENTER VR" below to start.</p>
    </div>
    
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.170.0/build/three.module.js';
        import { VRButton } from 'https://unpkg.com/three@0.170.0/examples/jsm/webxr/VRButton.js';

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x1a0529, 5, 40);
        scene.background = new THREE.Color(0x1a0529);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 3); // Default view outside VR

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        // Let's add lighting
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(0, 10, 5);
        scene.add(dirLight);

        // Neon Floor
        const grid = new THREE.GridHelper(40, 40, 0xff00ff, 0x220544);
        grid.position.y = 0;
        scene.add(grid);

        // Cannons (10 o'clock, 12 o'clock, 2 o'clock)
        const cannonGeo = new THREE.CylinderGeometry(0.5, 0.5, 2, 16);
        cannonGeo.rotateX(Math.PI / 2);
        const cannonMat = new THREE.MeshStandardMaterial({ color: 0x222222, emissive: 0x111111 });

        const cannons = [];
        const cannonDist = 15;
        const cannonAngle = Math.PI / 6; // 30 degrees for 11 and 1 o'clock
        const cannonPositions = [
            [-cannonDist * Math.sin(cannonAngle), 1.2, -cannonDist * Math.cos(cannonAngle)], // 11 o'clock
            [0, 1.2, -cannonDist],                                                            // 12 o'clock
            [cannonDist * Math.sin(cannonAngle), 1.2, -cannonDist * Math.cos(cannonAngle)],   // 1 o'clock
        ];
        for(let i=0; i<3; i++) {
            const c = new THREE.Mesh(cannonGeo, cannonMat);
            c.position.set(cannonPositions[i][0], cannonPositions[i][1], cannonPositions[i][2]);
            scene.add(c);
            cannons.push(c);

            // Decorative light inside cannon
            const pl = new THREE.PointLight(0xffffff, 2, 3);
            pl.position.set(0, 0, 1.2);
            c.add(pl);
        }

        // Sabers
        const saberRadius = 0.025;
        const saberLength = 1.2;
        const saberGeo = new THREE.CylinderGeometry(saberRadius, saberRadius, saberLength, 16);
        saberGeo.rotateX(-Math.PI / 2); // align with -Z
        saberGeo.translate(0, 0, -saberLength/2); // anchor hilt to controller

        const leftMat = new THREE.MeshStandardMaterial({ color: 0xff0044, emissive: 0xff0044, emissiveIntensity: 3, roughness: 0.2 });
        const rightMat = new THREE.MeshStandardMaterial({ color: 0x0044ff, emissive: 0x0044ff, emissiveIntensity: 3, roughness: 0.2 });

        const leftSaber = new THREE.Mesh(saberGeo, leftMat);
        const rightSaber = new THREE.Mesh(saberGeo, rightMat);

        const controller0 = renderer.xr.getController(0);
        const controller1 = renderer.xr.getController(1);
        scene.add(controller0);
        scene.add(controller1);

        // Safely determine handedness when connected
        controller0.addEventListener('connected', (e) => {
            if (e.data.handedness === 'left') { leftSaber.parent?.remove(leftSaber); controller0.add(leftSaber); leftSaber.userData.tracker = controller0; }
            if (e.data.handedness === 'right') { rightSaber.parent?.remove(rightSaber); controller0.add(rightSaber); rightSaber.userData.tracker = controller0; }
        });
        controller1.addEventListener('connected', (e) => {
            if (e.data.handedness === 'left') { leftSaber.parent?.remove(leftSaber); controller1.add(leftSaber); leftSaber.userData.tracker = controller1; }
            if (e.data.handedness === 'right') { rightSaber.parent?.remove(rightSaber); controller1.add(rightSaber); rightSaber.userData.tracker = controller1; }
        });

        let playing = false;
        renderer.xr.addEventListener('sessionstart', () => {
            playing = true;
            document.getElementById('overlay').style.display = 'none';
        });
        renderer.xr.addEventListener('sessionend', () => {
            playing = false;
            document.getElementById('overlay').style.display = 'flex';
        });

        // Projectile System
        const projectiles = [];
        const debris = [];

        const boxSize = 0.45;
        const geometries = [
            new THREE.BoxGeometry(boxSize, boxSize, boxSize),
            new THREE.SphereGeometry(boxSize * 0.6, 16, 16),
            new THREE.CylinderGeometry(boxSize * 0.4, boxSize * 0.4, boxSize, 16),
            new THREE.ConeGeometry(boxSize * 0.5, boxSize, 16),
            new THREE.CylinderGeometry(boxSize * 0.6, boxSize * 0.6, boxSize * 0.2, 16), // Disk
            new THREE.TetrahedronGeometry(boxSize * 0.7), // Triangle
            new THREE.OctahedronGeometry(boxSize * 0.5), // Diamond
            new THREE.IcosahedronGeometry(boxSize * 0.5), // D20
            new THREE.DodecahedronGeometry(boxSize * 0.45), // Pentagon ball
            new THREE.TorusGeometry(boxSize * 0.35, boxSize * 0.12, 12, 24), // Donut
            new THREE.TorusKnotGeometry(boxSize * 0.25, boxSize * 0.08, 64, 12), // Knot
            new THREE.CapsuleGeometry(boxSize * 0.2, boxSize * 0.4, 8, 16), // Pill
            new THREE.BoxGeometry(boxSize * 1.2, boxSize * 0.3, boxSize * 0.3), // Plank
            new THREE.ConeGeometry(boxSize * 0.4, boxSize * 1.2, 3), // Tall triangular prism
            new THREE.CylinderGeometry(0, boxSize * 0.6, boxSize * 0.8, 6), // Hexagonal pyramid
            new THREE.RingGeometry(boxSize * 0.2, boxSize * 0.5, 24), // Flat ring
        ];
        // Procedural Textures
        function genTex(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,128,128);
            if (type === 'checker') {
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fillRect(0,0,64,64); ctx.fillRect(64,64,64,64);
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(64,0,64,64); ctx.fillRect(0,64,64,64);
            } else if (type === 'stripes') {
                for(let i=0; i<128; i+=32) {
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(i,0,16,128);
                }
            } else if (type === 'dots') {
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                for(let y=16; y<128; y+=32) {
                    for(let x=16; x<128; x+=32) {
                        ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2); ctx.fill();
                    }
                }
            } else if (type === 'grid') {
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 4;
                for(let i=0; i<=128; i+=32) {
                    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,128); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(128,i); ctx.stroke();
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.magFilter = THREE.NearestFilter;
            return tex;
        }

        const texPool = [genTex('checker'), genTex('stripes'), genTex('dots'), genTex('grid'), null];

        function createMatPool(c, e) {
            return texPool.map(tex => new THREE.MeshStandardMaterial({
                color: c, roughness: 0.1, metalness: 0.2, emissive: e, map: tex
            }));
        }

        const redMats = createMatPool(0xff0044, 0x330000);
        const blueMats = createMatPool(0x0044ff, 0x000033);
        const grayMats = createMatPool(0xaaaaaa, 0x111111);

        // Score UI
        let score = 0;
        let combo = 0;
        let misses = 0;
        let sliced = 0;
        const uiCanvas = document.createElement('canvas');
        uiCanvas.width = 1024; uiCanvas.height = 512;
        const uiCtx = uiCanvas.getContext('2d');
        const uiTex = new THREE.CanvasTexture(uiCanvas);
        const uiMesh = new THREE.Mesh(new THREE.PlaneGeometry(6, 3), new THREE.MeshBasicMaterial({ map: uiTex, transparent: true }));
        uiMesh.position.set(0, 4, -12); // float high above cannons
        scene.add(uiMesh);

        function updateUI() {
            uiCtx.clearRect(0,0,1024,512);

            uiCtx.fillStyle = '#fff';
            uiCtx.font = 'bold 80px sans-serif';
            uiCtx.textAlign = 'center';
            uiCtx.fillText('SCORE: ' + score, 512, 100);
            
            uiCtx.fillStyle = '#4facfe';
            uiCtx.font = 'bold 60px sans-serif';
            uiCtx.fillText('COMBO: x' + combo, 512, 180);

            uiCtx.fillStyle = '#00ffaa';
            uiCtx.font = 'bold 50px sans-serif';
            uiCtx.fillText('SLICED: ' + sliced, 512, 300);

            uiCtx.fillStyle = '#ff4444';
            uiCtx.font = 'bold 50px sans-serif';
            uiCtx.fillText('MISSES: ' + misses, 512, 380);

            uiTex.needsUpdate = true;
        }
        updateUI();

        let lastSpawn = 0;
        let spawnInterval = 1200; // ms between spawns

        function spawnProjectile(time) {
            const lane = Math.floor(Math.random() * 3);
            const cannon = cannons[lane];
            
            const rand = Math.random();
            let matPool, type;
            if (rand < 0.4) { matPool = redMats; type = 'red'; }
            else if (rand < 0.8) { matPool = blueMats; type = 'blue'; }
            else { matPool = grayMats; type = 'any'; }

            const mat = matPool[Math.floor(Math.random() * matPool.length)];

            const randomGeo = geometries[Math.floor(Math.random() * geometries.length)];
            const mesh = new THREE.Mesh(randomGeo, mat);
            mesh.position.copy(cannon.position);
            
            // Parabolic Trajectory Math targeting dynamic physical headset tracking (Room Scale VR Fix)
            const T = 1.0 + Math.random() * 1.5; // Random Time to live (speed variation)
            const targetX = camera.position.x + (Math.random() - 0.5) * 1.2;
            const targetY = camera.position.y - 0.7 + (Math.random() - 0.5) * 1.2;
            const targetZ = camera.position.z - 0.3 + (Math.random() - 0.5) * 1.2;
            const g = -8.0; // Floaty gravity

            const dx = targetX - cannon.position.x;
            const dy = targetY - cannon.position.y;
            const dz = targetZ - cannon.position.z;

            const vx = dx / T;
            const vz = dz / T;
            const vy = (dy - 0.5 * g * T * T) / T;

            // Start slightly outside cannon to avoid clipping
            mesh.position.add(new THREE.Vector3(vx, vy, vz).normalize().multiplyScalar(1.5));

            mesh.userData = {
                type: type,
                velocity: new THREE.Vector3(vx, vy, vz),
                spin: new THREE.Vector3(Math.random(), Math.random(), Math.random()).multiplyScalar(3)
            };
            scene.add(mesh);
            projectiles.push(mesh);

            // Give the cannon some life by aiming it
            cannon.lookAt(cannon.position.clone().add(mesh.userData.velocity));
        }

        // When split, duplicate the geometry, squash it, and push them apart
        function createDebris(mesh) {
            for(let i=-1; i<=1; i+=2) {
                const part = new THREE.Mesh(mesh.geometry, mesh.material);
                part.position.copy(mesh.position);
                part.rotation.copy(mesh.rotation);

                // Squash along X axis to simulate being cut in half
                part.scale.set(0.5, 1, 1);
                part.position.x += i * 0.15; 
                
                // Inherit Z speed, but add outward push (X) and upward pop (Y)
                part.userData = {
                    velocity: new THREE.Vector3(i * (2 + Math.random()*2), 3 + Math.random()*2, mesh.userData.velocity.z),
                    spin: new THREE.Vector3(Math.random(), Math.random(), Math.random()).multiplyScalar(8),
                    grounded: false,
                    deathTime: 0
                };
                scene.add(part);
                debris.push(part);
            }
            scene.remove(mesh);
        }

        // Distance from point P to line segment AB
        function distToSegment(P, A, B) {
            const AB = new THREE.Vector3().subVectors(B, A);
            const AP = new THREE.Vector3().subVectors(P, A);
            const lenSq = AB.lengthSq();
            if (lenSq === 0) return AP.length();
            let t = Math.max(0, Math.min(1, AP.dot(AB) / lenSq));
            const closest = new THREE.Vector3().copy(A).add(AB.multiplyScalar(t));
            return closest.distanceTo(P);
        }

        const hitRadius = (boxSize * 0.8) + saberRadius; // Generous hitbox for easy gameplay

        const A0 = new THREE.Vector3(), B0 = new THREE.Vector3();
        const A1 = new THREE.Vector3(), B1 = new THREE.Vector3();

        let lastTime = performance.now();

        renderer.setAnimationLoop((time) => {
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            if (playing) {
                // Spawning Logic
                if (time - lastSpawn > spawnInterval) {
                    spawnProjectile(time);
                    lastSpawn = time;
                    if (spawnInterval > 400) spawnInterval -= (spawnInterval > 800 ? 5 : 1); // Slowly decrease interval to increase difficulty
                }

                // Gather global saber coordinates mapping hilt to tip
                // Note: Not all setups natively guarantee tracker binding; we fall back gracefully if none
                if (leftSaber.userData.tracker) {
                    leftSaber.userData.tracker.localToWorld(A0.set(0,0,0));
                    leftSaber.userData.tracker.localToWorld(B0.set(0,0,-saberLength));
                }
                
                if (rightSaber.userData.tracker) {
                    rightSaber.userData.tracker.localToWorld(A1.set(0,0,0));
                    rightSaber.userData.tracker.localToWorld(B1.set(0,0,-saberLength));
                }

                // Process Active Projectiles
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    const p = projectiles[i];
                    p.userData.velocity.y += -8.0 * dt; // Apply gravity curve
                    p.position.addScaledVector(p.userData.velocity, dt);

                    // Apply visual spin
                    p.rotation.x += p.userData.spin.x * dt;
                    p.rotation.y += p.userData.spin.y * dt;
                    p.rotation.z += p.userData.spin.z * dt;

                    let hit = false;
                    let hitType = '';

                    // Check Left Saber (Red)
                    if (leftSaber.userData.tracker && distToSegment(p.position, A0, B0) < hitRadius) {
                        hit = true; hitType = 'red';
                    }
                    // Check Right Saber (Blue)
                    if (!hit && rightSaber.userData.tracker && distToSegment(p.position, A1, B1) < hitRadius) {
                        hit = true; hitType = 'blue';
                    }

                    if (hit) {
                        if (p.userData.type === 'any' || p.userData.type === hitType) {
                            // Perfect hit
                            combo++;
                            sliced++;
                            score += 100 * Math.min(combo, 8); // combo multiplier caps at 8x
                            createDebris(p);
                        } else {
                            // Wrong color!
                            combo = 0;
                            scene.remove(p);
                        }
                        updateUI();
                        projectiles.splice(i, 1);
                        continue;
                    }

                    // Miss detection (moved too far behind player or hit floor early)
                    if (p.position.z > camera.position.z + 1.5 || p.position.y < -2) {
                        combo = 0;
                        misses++;
                        updateUI();
                        
                        // Drop it as a dead object on the floor
                        p.userData.velocity.set((Math.random()-0.5)*2, -2, (Math.random()-0.5)*2);
                        p.userData.spin = new THREE.Vector3(Math.random(), Math.random(), Math.random()).multiplyScalar(5);
                        p.userData.grounded = false;
                        p.userData.deathTime = 0;
                        debris.push(p);

                        projectiles.splice(i, 1);
                    }
                }

                // Process Falling Debris (Split blocks and missed blocks)
                for (let i = debris.length - 1; i >= 0; i--) {
                    const d = debris[i];
                    if (!d.userData.grounded) {
                        d.userData.velocity.y -= 25 * dt; // gravity
                        d.position.addScaledVector(d.userData.velocity, dt);
                        d.rotation.x += d.userData.spin.x * dt;
                        d.rotation.y += d.userData.spin.y * dt;
                        d.rotation.z += d.userData.spin.z * dt;

                        // Hit the floor
                        if (d.position.y <= 0.1) {
                            d.position.y = 0.1;
                            d.userData.grounded = true;
                            d.userData.deathTime = time + 4000; // Rest peacefully for 4 seconds
                        }
                    } else {
                        // Grounded behaviors
                        if (time > d.userData.deathTime) {
                            scene.remove(d);
                            debris.splice(i, 1);
                        } else if (d.userData.deathTime - time < 1000) {
                            // Smoothly shrink out of existence the last 1 second
                            d.scale.multiplyScalar(1 - 5 * dt);
                        }
                    }
                }
            }

            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
