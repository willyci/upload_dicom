<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slice VR Viewer</title>
    <meta name="description" content="WebXR viewer displaying DICOM slices as textured planes in 3D space.">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: sans-serif;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            z-index: 10;
            text-align: center;
        }

        .progress-container {
            margin-top: 15px;
            width: 300px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0066cc, #00aaff);
            border-radius: 3px;
            transition: width 0.15s ease;
        }

        .progress-text {
            margin-top: 8px;
            font-size: 14px;
            color: #aaa;
        }

        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-size: 18px;
            display: none;
            text-align: center;
            z-index: 10;
        }

        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            display: none;
            flex-direction: column;
            gap: 10px;
            min-width: 240px;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 100;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 12px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }

        input[type="range"] {
            width: 100%;
        }

        button {
            cursor: pointer;
            padding: 8px;
            background: #444;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
        }

        button:hover {
            background: #555;
        }

        h3 {
            margin: 0;
            font-size: 14px;
            color: #ddd;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        #vrButton {
            background: #0066cc;
            font-weight: bold;
            padding: 10px;
            font-size: 14px;
        }

        #vrButton:hover {
            background: #0088ff;
        }

        #vrButton.vr-active {
            background: #cc0000;
        }

        #vrButton:disabled {
            background: #222;
            color: #666;
            cursor: not-allowed;
        }

        .info-text {
            font-size: 11px;
            color: #888;
            margin-top: -5px;
        }

        .controls-help {
            font-size: 11px;
            color: #888;
        }

        .controls-help div {
            margin-bottom: 2px;
        }
    </style>
</head>

<body>
    <div id="loading">
        <div id="loadingText">Loading DICOM slices...</div>
        <div class="progress-container">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText"></div>
        </div>
    </div>
    <div id="error"></div>

    <div class="controls" id="controlPanel">
        <button id="vrButton" disabled>VR</button>
        <p class="info-text" id="vrInfo">Checking VR support...</p>

        <h3>Slice VR Viewer</h3>

        <div class="control-group">
            <label>Window Preset</label>
            <select id="windowPreset" style="width:100%; padding:4px; background:#333; color:#fff; border:1px solid #555; border-radius:4px;">
                <optgroup label="General">
                    <option value="default">Default</option>
                    <option value="highContrast">High Contrast</option>
                </optgroup>
                <optgroup label="CT Windows">
                    <option value="bone">CT - Bone</option>
                    <option value="lung">CT - Lung</option>
                    <option value="brain">CT - Brain</option>
                    <option value="softTissue">CT - Soft Tissue</option>
                    <option value="abdomen">CT - Abdomen</option>
                    <option value="mediastinum">CT - Mediastinum</option>
                    <option value="liver">CT - Liver</option>
                </optgroup>
                <optgroup label="MRI Sequences">
                    <option value="mriT1">MRI - T1 Weighted</option>
                    <option value="mriT2">MRI - T2 Weighted</option>
                    <option value="mriT2Flair">MRI - T2 FLAIR</option>
                    <option value="mriDWI">MRI - DWI</option>
                    <option value="mriADC">MRI - ADC Map</option>
                    <option value="mriSTIR">MRI - STIR / T2 FS</option>
                </optgroup>
            </select>
        </div>

        <div class="control-group">
            <label>Threshold Min <span id="threshMinVal">0</span></label>
            <input type="range" id="threshMin" min="0" max="255" step="1" value="0">
        </div>

        <div class="control-group">
            <label>Threshold Max <span id="threshMaxVal">255</span></label>
            <input type="range" id="threshMax" min="0" max="255" step="1" value="255">
        </div>

        <div class="control-group">
            <label>Brightness <span id="brightnessVal">0</span></label>
            <input type="range" id="brightness" min="-1" max="1" step="0.01" value="0">
        </div>

        <div class="control-group">
            <label>Contrast <span id="contrastVal">1.0</span></label>
            <input type="range" id="contrast" min="0.1" max="3" step="0.05" value="1">
        </div>

        <div class="control-group">
            <label>Color Map</label>
            <select id="lutSelect" style="width:100%; padding:4px; background:#333; color:#fff; border:1px solid #555; border-radius:4px;">
                <option value="none">Grayscale</option>
                <option value="hotIron">Hot Iron</option>
                <option value="pet">PET</option>
                <option value="rainbow">Rainbow</option>
                <option value="coolWarm">Cool-Warm</option>
                <option value="bone">Bone</option>
                <option value="inferno">Inferno</option>
                <option value="viridis">Viridis</option>
            </select>
        </div>

        <div class="control-group">
            <label>Bump Strength <span id="bumpVal">0.5</span></label>
            <input type="range" id="bumpStrength" min="0" max="2" step="0.05" value="0.5">
        </div>

        <div class="control-group">
            <label>Planes</label>
            <div style="display:flex; gap:10px; font-size:12px;">
                <label style="display:flex; align-items:center; gap:4px; cursor:pointer;">
                    <input type="checkbox" id="wallAxial" checked> Axial
                </label>
                <label style="display:flex; align-items:center; gap:4px; cursor:pointer;">
                    <input type="checkbox" id="wallSagittal"> Sagittal
                </label>
                <label style="display:flex; align-items:center; gap:4px; cursor:pointer;">
                    <input type="checkbox" id="wallCoronal"> Coronal
                </label>
            </div>
        </div>

        <div class="control-group">
            <label>Spacing Multiplier <span id="spacingVal">1.0</span></label>
            <input type="range" id="spacing" min="0.1" max="5" step="0.1" value="1">
        </div>

        <div class="control-group">
            <label>Slice From <span id="fromVal">1</span></label>
            <input type="range" id="sliceFrom" min="1" max="1" step="1" value="1">
        </div>

        <div class="control-group">
            <label>Slice To <span id="toVal">1</span></label>
            <input type="range" id="sliceTo" min="1" max="1" step="1" value="1">
        </div>

        <div class="control-group">
            <button id="resetBtn">Reset Camera</button>
        </div>

        <div class="controls-help">
            <div>Rotate: Left click + drag</div>
            <div>Pan: Right click + drag</div>
            <div>Zoom: Scroll wheel</div>
            <div>VR: Use controllers to grab/rotate</div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

        const loadingEl = document.getElementById('loading');
        const progressFill = document.getElementById('progressFill');
        const progressTextEl = document.getElementById('progressText');
        const errorEl = document.getElementById('error');
        const controlPanel = document.getElementById('controlPanel');

        function showError(msg) {
            loadingEl.style.display = 'none';
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
        }

        // Get folder from query params
        const params = new URLSearchParams(window.location.search);
        const folder = params.get('folder');

        if (!folder) {
            showError('No folder specified. Use ?folder=/uploads/TIMESTAMP_NAME');
        } else {
            init(folder);
        }

        async function init(folderPath) {
            // Fetch dicom_info.json
            let slices;
            try {
                const resp = await fetch(folderPath + '/dicom_info.json');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                slices = await resp.json();
            } catch (err) {
                showError('Failed to load dicom_info.json: ' + err.message);
                return;
            }

            if (!Array.isArray(slices) || slices.length === 0) {
                showError('No slices found in dicom_info.json');
                return;
            }

            // Sort slices by ImagePositionPatient[2], fallback SliceLocation, then InstanceNumber
            slices.sort((a, b) => {
                const ai = a.dicomInfo || {};
                const bi = b.dicomInfo || {};
                const az = ai.ImagePositionPatient ? ai.ImagePositionPatient[2] : (ai.SliceLocation ?? ai.InstanceNumber ?? 0);
                const bz = bi.ImagePositionPatient ? bi.ImagePositionPatient[2] : (bi.SliceLocation ?? bi.InstanceNumber ?? 0);
                return az - bz;
            });

            // Extract physical dimensions from first slice
            const info0 = slices[0].dicomInfo || {};
            const pixelSpacing = info0.PixelSpacing || [1, 1];
            const rows = info0.Rows || 256;
            const cols = info0.Columns || 256;
            const sliceThickness = info0.SliceThickness || 1;

            // Physical size of each plane in mm
            const planeWidthMM = cols * pixelSpacing[1];
            const planeHeightMM = rows * pixelSpacing[0];

            // Compute slice Z positions in mm (relative to first slice)
            const slicePositions = slices.map(s => {
                const si = s.dicomInfo || {};
                if (si.ImagePositionPatient) return si.ImagePositionPatient[2];
                if (si.SliceLocation != null) return si.SliceLocation;
                return 0;
            });
            const z0 = slicePositions[0];
            const relativeZ = slicePositions.map(z => z - z0);
            const stackDepthMM = Math.abs(relativeZ[relativeZ.length - 1] - relativeZ[0]) || (slices.length * sliceThickness);

            // Normalize so largest physical dimension maps to ~1 meter
            const maxDimMM = Math.max(planeWidthMM, planeHeightMM, stackDepthMM);
            const scale = 1.0 / maxDimMM; // mm to meters, normalized to 1m

            const planeW = planeWidthMM * scale;
            const planeH = planeHeightMM * scale;

            // Scene setup
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111118);

            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
            camera.position.set(0, 1.6, 2);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Lighting for bump map shading
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            // Ground grid
            const grid = new THREE.GridHelper(10, 20, 0x333333, 0x222222);
            grid.position.y = -0.01;
            scene.add(grid);

            // Slice group for grab-to-rotate
            const sliceGroup = new THREE.Group();
            sliceGroup.position.set(0, 1.2, -0.5);
            scene.add(sliceGroup);

            // --- LUT generation ---
            function buildLutTexture(stops) {
                // stops: array of [position (0-1), r, g, b] (0-255)
                const data = new Uint8Array(256 * 4);
                for (let i = 0; i < 256; i++) {
                    const t = i / 255;
                    let s0 = stops[0], s1 = stops[stops.length - 1];
                    for (let j = 0; j < stops.length - 1; j++) {
                        if (t >= stops[j][0] && t <= stops[j + 1][0]) {
                            s0 = stops[j]; s1 = stops[j + 1]; break;
                        }
                    }
                    const range = s1[0] - s0[0] || 1;
                    const f = (t - s0[0]) / range;
                    data[i * 4]     = Math.round(s0[1] + (s1[1] - s0[1]) * f);
                    data[i * 4 + 1] = Math.round(s0[2] + (s1[2] - s0[2]) * f);
                    data[i * 4 + 2] = Math.round(s0[3] + (s1[3] - s0[3]) * f);
                    data[i * 4 + 3] = 255;
                }
                const tex = new THREE.DataTexture(data, 256, 1, THREE.RGBAFormat);
                tex.minFilter = THREE.LinearFilter;
                tex.magFilter = THREE.LinearFilter;
                tex.needsUpdate = true;
                return tex;
            }

            const lutTextures = {
                hotIron: buildLutTexture([
                    [0, 0, 0, 0], [0.25, 128, 0, 0], [0.5, 255, 128, 0],
                    [0.75, 255, 255, 0], [1, 255, 255, 255]
                ]),
                pet: buildLutTexture([
                    [0, 0, 0, 0], [0.15, 0, 0, 128], [0.3, 0, 128, 255],
                    [0.45, 0, 255, 0], [0.6, 255, 255, 0], [0.8, 255, 128, 0], [1, 255, 0, 0]
                ]),
                rainbow: buildLutTexture([
                    [0, 0, 0, 255], [0.25, 0, 255, 255], [0.5, 0, 255, 0],
                    [0.75, 255, 255, 0], [1, 255, 0, 0]
                ]),
                coolWarm: buildLutTexture([
                    [0, 59, 76, 192], [0.25, 124, 159, 230], [0.5, 221, 221, 221],
                    [0.75, 218, 130, 108], [1, 180, 4, 38]
                ]),
                bone: buildLutTexture([
                    [0, 0, 0, 0], [0.33, 41, 41, 59], [0.66, 107, 149, 161], [1, 255, 255, 255]
                ]),
                inferno: buildLutTexture([
                    [0, 0, 0, 4], [0.14, 31, 12, 72], [0.29, 85, 15, 109],
                    [0.43, 136, 34, 106], [0.57, 186, 54, 85], [0.71, 227, 89, 51],
                    [0.86, 249, 149, 21], [1, 252, 255, 164]
                ]),
                viridis: buildLutTexture([
                    [0, 68, 1, 84], [0.14, 72, 31, 112], [0.29, 62, 73, 137],
                    [0.43, 49, 104, 142], [0.57, 38, 130, 142], [0.71, 31, 158, 137],
                    [0.86, 109, 205, 89], [1, 253, 231, 37]
                ])
            };

            // Shared uniforms for threshold, bump, and LUT
            const sharedUniforms = {
                uThreshMin: { value: 0.0 },
                uThreshMax: { value: 1.0 },
                uBumpScale: { value: 0.5 },
                uLightDir: { value: new THREE.Vector3(0.36, 0.72, 0.59).normalize() },
                lutMap: { value: null },
                useLut: { value: false },
                uBrightness: { value: 0.0 },
                uContrast: { value: 1.0 }
            };

            const sliceVertexShader = `
                varying vec2 vUv;
                varying vec3 vNormal;
                varying vec3 vViewDir;
                void main() {
                    vUv = uv;
                    vNormal = normalize(normalMatrix * normal);
                    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                    vViewDir = -mvPos.xyz;
                    gl_Position = projectionMatrix * mvPos;
                }
            `;

            const sliceFragmentShader = `
                uniform sampler2D map;
                uniform sampler2D bumpMap;
                uniform bool hasBumpMap;
                uniform float uThreshMin;
                uniform float uThreshMax;
                uniform float uBumpScale;
                uniform vec3 uLightDir;
                uniform sampler2D lutMap;
                uniform bool useLut;
                uniform float uBrightness;
                uniform float uContrast;
                varying vec2 vUv;
                varying vec3 vNormal;
                varying vec3 vViewDir;

                void main() {
                    vec4 texColor = texture2D(map, vUv);

                    // Apply brightness and contrast before threshold
                    vec3 adjusted = (texColor.rgb - 0.5) * uContrast + 0.5 + uBrightness;
                    adjusted = clamp(adjusted, 0.0, 1.0);

                    float luminance = dot(adjusted, vec3(0.299, 0.587, 0.114));
                    if (luminance < uThreshMin || luminance > uThreshMax) {
                        discard;
                    }

                    // Apply LUT: remap luminance through color lookup table
                    vec3 color = adjusted;
                    if (useLut) {
                        color = texture2D(lutMap, vec2(luminance, 0.5)).rgb;
                    }

                    vec3 normal = normalize(vNormal);

                    if (hasBumpMap && uBumpScale > 0.0) {
                        vec2 texSize = vec2(textureSize(bumpMap, 0));
                        vec2 step = 1.0 / texSize;
                        float hL = dot(texture2D(bumpMap, vUv - vec2(step.x, 0.0)).rgb, vec3(0.299, 0.587, 0.114));
                        float hR = dot(texture2D(bumpMap, vUv + vec2(step.x, 0.0)).rgb, vec3(0.299, 0.587, 0.114));
                        float hD = dot(texture2D(bumpMap, vUv - vec2(0.0, step.y)).rgb, vec3(0.299, 0.587, 0.114));
                        float hU = dot(texture2D(bumpMap, vUv + vec2(0.0, step.y)).rgb, vec3(0.299, 0.587, 0.114));
                        vec3 bumpNormal = normalize(vec3(
                            (hL - hR) * uBumpScale,
                            (hD - hU) * uBumpScale,
                            1.0
                        ));
                        normal = normalize(normal + bumpNormal.x * vec3(1.0, 0.0, 0.0) + bumpNormal.y * vec3(0.0, 1.0, 0.0));
                    }

                    float diffuse = max(dot(normal, normalize(uLightDir)), 0.0);
                    vec3 lit = color * (0.4 + 0.6 * diffuse);

                    gl_FragColor = vec4(lit, texColor.a);
                }
            `;

            // Load MPR info for sagittal/coronal slices
            let mprInfo = null;
            try {
                const mprUrl = folderPath + '/mpr/mpr_info.json';
                console.log('Fetching MPR info from:', mprUrl);
                const mprResp = await fetch(mprUrl);
                if (mprResp.ok) {
                    mprInfo = await mprResp.json();
                    console.log('MPR info loaded:', mprInfo);
                } else {
                    console.warn('MPR info not found:', mprResp.status);
                }
            } catch (e) {
                console.warn('MPR info fetch error:', e);
            }

            // Create planes and load textures in batches
            const textureLoader = new THREE.TextureLoader();
            const planesAxial = [];
            const planesSagittal = [];
            const planesCoronal = [];
            const materials = [];
            const BATCH_SIZE = 10;
            const totalSlices = slices.length;

            // Sub-groups for each plane orientation
            const wallAxial = new THREE.Group();
            const wallSagittal = new THREE.Group();
            const wallCoronal = new THREE.Group();
            sliceGroup.add(wallAxial);
            sliceGroup.add(wallSagittal);
            sliceGroup.add(wallCoronal);
            wallSagittal.visible = false;
            wallCoronal.visible = false;

            // Use mprInfo spacing if available, fallback to dicom values
            const mprSpacing = mprInfo ? mprInfo.spacing : null;
            const spacingX = mprSpacing ? mprSpacing[0] : pixelSpacing[1];
            const spacingY = mprSpacing ? mprSpacing[1] : pixelSpacing[0];
            const spacingZ = mprSpacing ? mprSpacing[2] : sliceThickness;

            // Physical extents along each axis (in normalized scale units)
            const extentX = cols * spacingX * scale;    // X = columns
            const extentY = rows * spacingY * scale;    // Y = rows
            const extentZ = stackDepthMM * scale;       // Z = actual stack depth from IPP

            // Sagittal plane (YZ): mpr.js outputs width=depth(Z), height=rows(Y)
            const sagW = extentZ;   // image width = Z axis (superior-inferior)
            const sagH = extentY;   // image height = Y axis (anterior-posterior)

            // Coronal plane (XZ): shows X on width, Z on height — must match axial stack exactly
            const corW = extentX;   // spans the X axis (same width as axial)
            const corH = extentZ;   // spans the Z axis (stack depth)

            console.log(`Axial plane: ${planeW.toFixed(4)} x ${planeH.toFixed(4)}`);
            console.log(`Sagittal plane: ${sagW.toFixed(4)} x ${sagH.toFixed(4)}, extentX for stacking: ${extentX.toFixed(4)}`);
            console.log(`Coronal plane: ${corW.toFixed(4)} x ${corH.toFixed(4)}, extentY for stacking: ${extentY.toFixed(4)}`);

            function pad3(n) { return String(n).padStart(3, '0'); }

            progressTextEl.textContent = `Loading 0 / ${totalSlices} axial slices`;

            function loadTex(path) {
                return new Promise((resolve) => {
                    if (!path) { resolve(null); return; }
                    textureLoader.load(path, resolve, undefined, () => resolve(null));
                });
            }

            function makeMat(texture, bumpTex) {
                const mat = new THREE.ShaderMaterial({
                    uniforms: {
                        map: { value: texture },
                        bumpMap: { value: bumpTex },
                        hasBumpMap: { value: !!bumpTex },
                        uThreshMin: sharedUniforms.uThreshMin,
                        uThreshMax: sharedUniforms.uThreshMax,
                        uBumpScale: sharedUniforms.uBumpScale,
                        uLightDir: sharedUniforms.uLightDir,
                        lutMap: sharedUniforms.lutMap,
                        useLut: sharedUniforms.useLut,
                        uBrightness: sharedUniforms.uBrightness,
                        uContrast: sharedUniforms.uContrast
                    },
                    vertexShader: sliceVertexShader,
                    fragmentShader: sliceFragmentShader,
                    side: THREE.DoubleSide,
                    transparent: true
                });
                materials.push(mat);
                return mat;
            }

            // --- Load axial slices (from dicom_info.json) ---
            for (let i = 0; i < totalSlices; i += BATCH_SIZE) {
                const batch = slices.slice(i, Math.min(i + BATCH_SIZE, totalSlices));
                const promises = batch.map(async (slice, batchIdx) => {
                    const idx = i + batchIdx;
                    if (!slice.jpgPath) return null;

                    const [texture, bumpTex] = await Promise.all([
                        loadTex(slice.jpgPath),
                        loadTex(slice.bumpMapPath)
                    ]);
                    if (!texture) return null;

                    texture.colorSpace = THREE.SRGBColorSpace;
                    const geom = new THREE.PlaneGeometry(planeW, planeH);
                    const zPos = relativeZ[idx] * scale;

                    const mesh = new THREE.Mesh(geom, makeMat(texture, bumpTex));
                    mesh.position.set(0, 0, zPos);
                    mesh.userData.basePos = zPos;
                    mesh.userData.axis = 'z';
                    mesh.userData.sliceIndex = idx;
                    planesAxial.push(mesh);
                    wallAxial.add(mesh);
                    return mesh;
                });

                await Promise.all(promises);
                const loaded = Math.min(i + BATCH_SIZE, totalSlices);
                progressFill.style.width = ((loaded / totalSlices) * 50).toFixed(1) + '%';
                progressTextEl.textContent = `Loading ${loaded} / ${totalSlices} axial slices`;
            }

            // Center axial stack
            if (planesAxial.length > 0) {
                const positions = planesAxial.map(p => p.userData.basePos);
                const center = (Math.min(...positions) + Math.max(...positions)) / 2;
                planesAxial.forEach(p => { p.position.z -= center; p.userData.basePos -= center; });
            }

            // Subsample indices: pick evenly spaced slices, max MAX_SLICES
            const MAX_SLICES = 60;
            function subsample(count) {
                if (count <= MAX_SLICES) return Array.from({ length: count }, (_, i) => i);
                const indices = [];
                for (let i = 0; i < MAX_SLICES; i++) {
                    indices.push(Math.round(i * (count - 1) / (MAX_SLICES - 1)));
                }
                return indices;
            }

            // --- Load sagittal slices (from mpr/) ---
            if (mprInfo && mprInfo.sagittal) {
                const sagCount = mprInfo.sagittal.count;
                const sagIndices = subsample(sagCount);
                const sagGeom = new THREE.PlaneGeometry(sagW, sagH);
                console.log(`Loading ${sagIndices.length} sagittal slices (of ${sagCount} total), plane size: ${sagW.toFixed(3)} x ${sagH.toFixed(3)}`);
                progressTextEl.textContent = `Loading 0 / ${sagIndices.length} sagittal slices`;

                for (let i = 0; i < sagIndices.length; i += BATCH_SIZE) {
                    const batchIndices = sagIndices.slice(i, i + BATCH_SIZE);
                    const promises = batchIndices.map(idx => (async () => {
                        const texPath = folderPath + '/mpr/sagittal/sagittal_' + pad3(idx) + '.jpg';
                        const bumpPath = folderPath + '/mpr/sagittal_bump/sagittal_' + pad3(idx) + '_bump.jpg';
                        const [tex, bump] = await Promise.all([loadTex(texPath), loadTex(bumpPath)]);
                        if (!tex) { console.warn('Failed to load sagittal', idx, texPath); return; }
                        tex.colorSpace = THREE.SRGBColorSpace;
                        const mesh = new THREE.Mesh(sagGeom, makeMat(tex, bump));
                        mesh.rotation.y = Math.PI / 2;
                        const xPos = (idx / Math.max(sagCount - 1, 1) - 0.5) * extentX;
                        mesh.position.set(xPos, 0, 0);
                        mesh.userData.basePos = xPos;
                        mesh.userData.axis = 'x';
                        mesh.userData.sliceIndex = idx;
                        planesSagittal.push(mesh);
                        wallSagittal.add(mesh);
                    })());
                    await Promise.all(promises);
                    const loaded = Math.min(i + BATCH_SIZE, sagIndices.length);
                    progressFill.style.width = (50 + (loaded / sagIndices.length) * 25).toFixed(1) + '%';
                    progressTextEl.textContent = `Loading ${loaded} / ${sagIndices.length} sagittal slices`;
                }
                console.log(`Sagittal done: ${planesSagittal.length} planes in wallSagittal`);
            } else {
                console.warn('No sagittal MPR data available');
                document.getElementById('wallSagittal').disabled = true;
                document.getElementById('wallSagittal').parentElement.style.opacity = '0.4';
            }

            // --- Load coronal slices (from mpr/) ---
            if (mprInfo && mprInfo.coronal) {
                const corCount = mprInfo.coronal.count;
                const corIndices = subsample(corCount);
                const corGeom = new THREE.PlaneGeometry(corW, corH);
                console.log(`Loading ${corIndices.length} coronal slices (of ${corCount} total), plane size: ${corW.toFixed(3)} x ${corH.toFixed(3)}`);
                progressTextEl.textContent = `Loading 0 / ${corIndices.length} coronal slices`;

                for (let i = 0; i < corIndices.length; i += BATCH_SIZE) {
                    const batchIndices = corIndices.slice(i, i + BATCH_SIZE);
                    const promises = batchIndices.map(idx => (async () => {
                        const texPath = folderPath + '/mpr/coronal/coronal_' + pad3(idx) + '.jpg';
                        const bumpPath = folderPath + '/mpr/coronal_bump/coronal_' + pad3(idx) + '_bump.jpg';
                        const [tex, bump] = await Promise.all([loadTex(texPath), loadTex(bumpPath)]);
                        if (!tex) { console.warn('Failed to load coronal', idx, texPath); return; }
                        tex.colorSpace = THREE.SRGBColorSpace;
                        const mesh = new THREE.Mesh(corGeom, makeMat(tex, bump));
                        mesh.rotation.x = -Math.PI / 2;
                        const yPos = (0.5 - idx / Math.max(corCount - 1, 1)) * extentY;
                        mesh.position.set(0, yPos, 0);
                        mesh.userData.basePos = yPos;
                        mesh.userData.axis = 'y';
                        mesh.userData.sliceIndex = idx;
                        planesCoronal.push(mesh);
                        wallCoronal.add(mesh);
                    })());
                    await Promise.all(promises);
                    const loaded = Math.min(i + BATCH_SIZE, corIndices.length);
                    progressFill.style.width = (75 + (loaded / corIndices.length) * 25).toFixed(1) + '%';
                    progressTextEl.textContent = `Loading ${loaded} / ${corIndices.length} coronal slices`;
                }
                console.log(`Coronal done: ${planesCoronal.length} planes in wallCoronal`);
            } else {
                console.warn('No coronal MPR data available');
                document.getElementById('wallCoronal').disabled = true;
                document.getElementById('wallCoronal').parentElement.style.opacity = '0.4';
            }

            loadingEl.style.display = 'none';
            controlPanel.style.display = 'flex';

            // --- UI Controls ---
            const threshMinSlider = document.getElementById('threshMin');
            const threshMinVal = document.getElementById('threshMinVal');
            const threshMaxSlider = document.getElementById('threshMax');
            const threshMaxVal = document.getElementById('threshMaxVal');
            const spacingSlider = document.getElementById('spacing');
            const spacingVal = document.getElementById('spacingVal');
            const sliceFromSlider = document.getElementById('sliceFrom');
            const sliceToSlider = document.getElementById('sliceTo');
            const fromVal = document.getElementById('fromVal');
            const toVal = document.getElementById('toVal');

            // Set slice range slider bounds
            sliceFromSlider.max = totalSlices;
            sliceFromSlider.value = 1;
            sliceToSlider.max = totalSlices;
            sliceToSlider.value = totalSlices;
            fromVal.textContent = '1';
            toVal.textContent = totalSlices;

            threshMinSlider.addEventListener('input', (e) => {
                const val = parseInt(e.target.value);
                threshMinVal.textContent = val;
                sharedUniforms.uThreshMin.value = val / 255.0;
                if (val > parseInt(threshMaxSlider.value)) {
                    threshMaxSlider.value = val;
                    threshMaxVal.textContent = val;
                    sharedUniforms.uThreshMax.value = val / 255.0;
                }
            });

            threshMaxSlider.addEventListener('input', (e) => {
                const val = parseInt(e.target.value);
                threshMaxVal.textContent = val;
                sharedUniforms.uThreshMax.value = val / 255.0;
                if (val < parseInt(threshMinSlider.value)) {
                    threshMinSlider.value = val;
                    threshMinVal.textContent = val;
                    sharedUniforms.uThreshMin.value = val / 255.0;
                }
            });

            const bumpSlider = document.getElementById('bumpStrength');
            const bumpValEl = document.getElementById('bumpVal');
            bumpSlider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                bumpValEl.textContent = val.toFixed(2);
                sharedUniforms.uBumpScale.value = val;
            });

            const brightnessSlider = document.getElementById('brightness');
            const brightnessValEl = document.getElementById('brightnessVal');
            brightnessSlider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                brightnessValEl.textContent = val.toFixed(2);
                sharedUniforms.uBrightness.value = val;
            });

            const contrastSlider = document.getElementById('contrast');
            const contrastValEl = document.getElementById('contrastVal');
            contrastSlider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                contrastValEl.textContent = val.toFixed(1);
                sharedUniforms.uContrast.value = val;
            });

            // Window presets: { threshMin, threshMax, brightness, contrast }
            // Based on standard CT Hounsfield window/level mapped to 0-255 JPG range
            const windowPresets = {
                default:     { threshMin: 0,   threshMax: 255, brightness: 0,     contrast: 1.0  },
                bone:        { threshMin: 40,  threshMax: 255, brightness: -0.15,  contrast: 2.2  },
                lung:        { threshMin: 0,   threshMax: 200, brightness: 0.25,   contrast: 1.8  },
                brain:       { threshMin: 15,  threshMax: 200, brightness: 0.05,   contrast: 1.6  },
                softTissue:  { threshMin: 10,  threshMax: 220, brightness: 0.1,    contrast: 1.4  },
                abdomen:     { threshMin: 10,  threshMax: 210, brightness: 0.05,   contrast: 1.3  },
                mediastinum: { threshMin: 20,  threshMax: 230, brightness: 0,      contrast: 1.5  },
                liver:       { threshMin: 15,  threshMax: 200, brightness: 0.08,   contrast: 1.5  },
                highContrast:{ threshMin: 5,   threshMax: 250, brightness: 0,      contrast: 2.5  },
                // MRI sequences
                mriT1:       { threshMin: 5,   threshMax: 245, brightness: 0,      contrast: 1.3  },
                mriT2:       { threshMin: 10,  threshMax: 230, brightness: 0.1,    contrast: 1.8  },
                mriT2Flair:  { threshMin: 15,  threshMax: 210, brightness: -0.05,  contrast: 2.2  },
                mriDWI:      { threshMin: 5,   threshMax: 255, brightness: -0.1,   contrast: 2.8  },
                mriADC:      { threshMin: 0,   threshMax: 255, brightness: 0,      contrast: 1.0  },
                mriSTIR:     { threshMin: 10,  threshMax: 220, brightness: 0.08,   contrast: 1.9  }
            };

            function applyPreset(name) {
                const p = windowPresets[name];
                if (!p) return;

                threshMinSlider.value = p.threshMin;
                threshMinVal.textContent = p.threshMin;
                sharedUniforms.uThreshMin.value = p.threshMin / 255.0;

                threshMaxSlider.value = p.threshMax;
                threshMaxVal.textContent = p.threshMax;
                sharedUniforms.uThreshMax.value = p.threshMax / 255.0;

                brightnessSlider.value = p.brightness;
                brightnessValEl.textContent = p.brightness.toFixed(2);
                sharedUniforms.uBrightness.value = p.brightness;

                contrastSlider.value = p.contrast;
                contrastValEl.textContent = p.contrast.toFixed(1);
                sharedUniforms.uContrast.value = p.contrast;
            }

            document.getElementById('windowPreset').addEventListener('change', (e) => {
                applyPreset(e.target.value);
            });

            document.getElementById('lutSelect').addEventListener('change', (e) => {
                const key = e.target.value;
                if (key === 'none') {
                    sharedUniforms.useLut.value = false;
                    sharedUniforms.lutMap.value = null;
                } else {
                    sharedUniforms.lutMap.value = lutTextures[key];
                    sharedUniforms.useLut.value = true;
                }
            });

            spacingSlider.addEventListener('input', (e) => {
                const mul = parseFloat(e.target.value);
                spacingVal.textContent = mul.toFixed(1);
                planesAxial.forEach(p => { p.position.z = p.userData.basePos * mul; });
                planesSagittal.forEach(p => { p.position.x = p.userData.basePos * mul; });
                planesCoronal.forEach(p => { p.position.y = p.userData.basePos * mul; });
            });

            // Plane visibility toggles
            document.getElementById('wallAxial').addEventListener('change', (e) => { wallAxial.visible = e.target.checked; });
            document.getElementById('wallSagittal').addEventListener('change', (e) => { wallSagittal.visible = e.target.checked; });
            document.getElementById('wallCoronal').addEventListener('change', (e) => { wallCoronal.visible = e.target.checked; });

            function updateSliceVisibility() {
                const from = parseInt(sliceFromSlider.value) - 1; // 0-indexed
                const to = parseInt(sliceToSlider.value) - 1;
                // Slice range applies to axial only (sagittal/coronal have different counts)
                planesAxial.forEach(p => {
                    p.visible = (p.userData.sliceIndex >= from && p.userData.sliceIndex <= to);
                });
            }

            sliceFromSlider.addEventListener('input', (e) => {
                fromVal.textContent = e.target.value;
                // Clamp: from cannot exceed to
                if (parseInt(e.target.value) > parseInt(sliceToSlider.value)) {
                    sliceToSlider.value = e.target.value;
                    toVal.textContent = e.target.value;
                }
                updateSliceVisibility();
            });

            sliceToSlider.addEventListener('input', (e) => {
                toVal.textContent = e.target.value;
                // Clamp: to cannot go below from
                if (parseInt(e.target.value) < parseInt(sliceFromSlider.value)) {
                    sliceFromSlider.value = e.target.value;
                    fromVal.textContent = e.target.value;
                }
                updateSliceVisibility();
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                camera.position.set(0, 1.6, 2);
                controls.target.set(0, 1.2, -0.5);
                controls.update();
            });

            // --- VR ---
            setupVR(renderer);

            // --- VR Controllers (grab to rotate slice group) ---
            const controllerModelFactory = new XRControllerModelFactory();

            const controllerGrip0 = renderer.xr.getControllerGrip(0);
            controllerGrip0.add(controllerModelFactory.createControllerModel(controllerGrip0));
            scene.add(controllerGrip0);

            const controllerGrip1 = renderer.xr.getControllerGrip(1);
            controllerGrip1.add(controllerModelFactory.createControllerModel(controllerGrip1));
            scene.add(controllerGrip1);

            const controller0 = renderer.xr.getController(0);
            const controller1 = renderer.xr.getController(1);
            scene.add(controller0);
            scene.add(controller1);

            // Controller ray visuals
            const lineGeom = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(0, 0, -3)
            ]);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.6 });
            controller0.add(new THREE.Line(lineGeom.clone(), lineMat.clone()));
            controller1.add(new THREE.Line(lineGeom.clone(), lineMat.clone()));

            // Grab state
            let grabbing = false;
            let grabController = null;
            const grabStartQuat = new THREE.Quaternion();
            const groupStartQuat = new THREE.Quaternion();
            const grabStartPos = new THREE.Vector3();
            const groupStartPos = new THREE.Vector3();

            function onSelectStart(event) {
                grabbing = true;
                grabController = event.target;
                grabStartQuat.copy(grabController.quaternion);
                groupStartQuat.copy(sliceGroup.quaternion);
                grabStartPos.copy(grabController.position);
                groupStartPos.copy(sliceGroup.position);
            }

            function onSelectEnd() {
                grabbing = false;
                grabController = null;
            }

            controller0.addEventListener('selectstart', onSelectStart);
            controller0.addEventListener('selectend', onSelectEnd);
            controller1.addEventListener('selectstart', onSelectStart);
            controller1.addEventListener('selectend', onSelectEnd);

            // --- Render Loop ---
            renderer.setAnimationLoop(() => {
                if (grabbing && grabController) {
                    const deltaQuat = new THREE.Quaternion();
                    deltaQuat.copy(grabController.quaternion).multiply(grabStartQuat.clone().invert());
                    sliceGroup.quaternion.copy(deltaQuat).multiply(groupStartQuat);

                    const deltaPos = new THREE.Vector3().subVectors(grabController.position, grabStartPos);
                    sliceGroup.position.copy(groupStartPos).add(deltaPos);
                }

                if (!renderer.xr.isPresenting) {
                    controls.update();
                }

                renderer.render(scene, camera);
            });

            // Resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function setupVR(renderer) {
            const vrButton = document.getElementById('vrButton');
            const vrInfo = document.getElementById('vrInfo');

            if (!('xr' in navigator)) {
                vrButton.disabled = true;
                vrInfo.innerHTML = 'WebXR not available. <b>Use HTTPS</b> (port 3443) for VR on Quest/Vision Pro.';
                return;
            }

            navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
                if (supported) {
                    vrButton.disabled = false;
                    vrInfo.textContent = 'VR headset detected! Click to enter VR.';
                    vrInfo.style.color = '#10b981';

                    vrButton.addEventListener('click', async () => {
                        try {
                            const session = await navigator.xr.requestSession('immersive-vr', {
                                optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking']
                            });
                            renderer.xr.setSession(session);
                            vrButton.textContent = 'Exit VR';
                            vrButton.classList.add('vr-active');

                            session.addEventListener('end', () => {
                                vrButton.textContent = 'VR';
                                vrButton.classList.remove('vr-active');
                            });
                        } catch (e) {
                            console.error('VR session error:', e);
                            vrInfo.textContent = 'Failed to start VR: ' + e.message;
                            vrInfo.style.color = '#ef4444';
                        }
                    });
                } else {
                    vrButton.disabled = true;
                    vrInfo.textContent = 'VR not available. Desktop 3D mode only.';
                }
            }).catch(() => {
                vrButton.disabled = true;
                vrInfo.textContent = 'VR check failed.';
            });
        }
    </script>
</body>

</html>
